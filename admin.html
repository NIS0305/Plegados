<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administración — Plegados</title>
  <link rel="icon" href="favicon.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-wrapper">
    <div class="auth-brand">
      <img src="logo.png" alt="Lumon" style="height:64px;width:auto;filter:brightness(0) invert(1);margin-bottom:12px" />
      <p style="color:var(--text-muted);font-size:13px;letter-spacing:.05em;text-transform:uppercase">Panel de administración</p>
    </div>

    <div class="auth-card">
      <form id="adminLoginForm" class="auth-form active" novalidate>
        <div class="form-group">
          <label for="adminEmail">Email</label>
          <input type="email" id="adminEmail" placeholder="tu@email.com" required autocomplete="username" />
          <span class="error-msg" id="err-adminEmail"></span>
        </div>
        <div class="form-group">
          <label for="adminPassword">Contraseña</label>
          <div class="pass-wrap">
            <input type="password" id="adminPassword" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="toggle-pass" data-target="adminPassword">👁</button>
          </div>
          <span class="error-msg" id="err-adminPassword"></span>
        </div>
        <div class="error-msg form-error" id="adminError"></div>
        <button type="submit" class="btn btn-primary btn-full" id="adminLoginBtn">Entrar</button>
      </form>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // Redirect if already logged in as admin
    const existing = getCurrentUser();
    if (existing && existing.role === 'admin') window.location.href = 'dashboard.html';

    document.querySelector('.toggle-pass').addEventListener('click', function () {
      const inp = document.getElementById(this.dataset.target);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      this.textContent = inp.type === 'password' ? '👁' : '🙈';
    });

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('adminEmail').value.trim();
      const pass  = document.getElementById('adminPassword').value;
      const errEl = document.getElementById('adminError');
      const btn   = document.getElementById('adminLoginBtn');

      document.getElementById('err-adminEmail').textContent    = '';
      document.getElementById('err-adminPassword').textContent = '';
      errEl.textContent = '';

      if (!email) { document.getElementById('err-adminEmail').textContent = 'Ingresa tu email'; return; }
      if (!pass)  { document.getElementById('err-adminPassword').textContent = 'Ingresa tu contraseña'; return; }

      btn.disabled = true; btn.textContent = 'Verificando...';
      try {
        const user = await loginUser(email, pass);
        if (user.role !== 'admin') {
          errEl.textContent = 'Acceso restringido a administradores.';
          btn.disabled = false; btn.textContent = 'Entrar';
          return;
        }
        setCurrentUser(user);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    });

    ['adminEmail','adminPassword'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById('err-' + id).textContent = '';
        document.getElementById('adminError').textContent = '';
      });
    });
  </script>
</body>
</html>
