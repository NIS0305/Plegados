<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuevo Pedido — Plegados</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="flex-shrink:0"><path d="M4 4h7l5 5v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/><polyline points="11 4 11 10 17 10"/><line x1="7" y1="15" x2="13" y2="15"/><line x1="7" y1="18" x2="11" y2="18"/></svg> Plegados
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">Nuevo Pedido</a>
      <a href="dashboard.html" class="nav-link">Dashboard</a>
    </div>
    <div class="nav-user">
      <span class="nav-avatar" id="navAvatar"></span>
      <span class="nav-username" id="navUsername"></span>
      <button class="btn btn-secondary btn-sm" id="logoutBtn">Salir</button>
    </div>
  </nav>

  <main class="container">
    <div class="card">
      <h1 class="card-title">Nuevo Pedido de Plegado</h1>
      <p class="card-subtitle">Completa el formulario para enviar tu solicitud</p>

      <form id="pedidoForm" novalidate>

        <div class="form-group">
          <label for="montador">Nombre del Montador</label>
          <input type="text" id="montador" readonly class="input-readonly" />
        </div>

        <div class="form-group">
          <label>Medidas de Plegado *</label>
          <div class="medidas-grid">
            <div>
              <label class="sublabel" for="largo">Largo (mm)</label>
              <input type="number" id="largo" placeholder="0" min="1" required />
              <span class="error-msg" id="err-largo"></span>
            </div>
            <div>
              <label class="sublabel" for="ancho">Ancho (mm)</label>
              <input type="number" id="ancho" placeholder="0" min="1" required />
              <span class="error-msg" id="err-ancho"></span>
            </div>
            <div>
              <label class="sublabel" for="espesor">Espesor (mm)</label>
              <input type="number" id="espesor" placeholder="0" min="0.1" step="0.1" required />
              <span class="error-msg" id="err-espesor"></span>
            </div>
            <div>
              <label class="sublabel" for="angulo">Ángulo (°)</label>
              <input type="number" id="angulo" placeholder="90" min="1" max="180" />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="material">Material</label>
          <select id="material">
            <option value="">Seleccionar material...</option>
            <option value="Acero inoxidable">Acero inoxidable</option>
            <option value="Acero galvanizado">Acero galvanizado</option>
            <option value="Aluminio">Aluminio</option>
            <option value="Cobre">Cobre</option>
            <option value="Hierro">Hierro</option>
            <option value="Otro">Otro</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cantidad">Cantidad de Piezas *</label>
          <input type="number" id="cantidad" placeholder="1" min="1" value="1" required />
          <span class="error-msg" id="err-cantidad"></span>
        </div>

        <div class="two-col">
          <div class="form-group">
            <label for="referencia">Número de Referencia</label>
            <input type="text" id="referencia" placeholder="Ej: REF-2024-001" />
          </div>
          <div class="form-group">
            <label for="ral">Color RAL</label>
            <input type="text" id="ral" placeholder="Ej: RAL 9005" />
          </div>
        </div>

        <div class="form-group">
          <label for="notas">Notas adicionales</label>
          <textarea id="notas" rows="3" placeholder="Observaciones, tolerancias, acabado superficial..."></textarea>
        </div>

        <div class="form-group">
          <label>Dibujo / Plano</label>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="dibujo" accept="image/*,.pdf" hidden />
            <div class="upload-content" id="uploadContent">
              <span class="upload-icon">📎</span>
              <p>Arrastra tu archivo aquí o <button type="button" class="link-btn" id="browseBtn">selecciona un archivo</button></p>
              <p class="upload-hint">Imágenes (JPG, PNG, SVG) o PDF</p>
            </div>
            <div class="file-preview" id="filePreview" style="display:none">
              <img id="previewImg" src="" alt="Vista previa" />
              <div class="file-info">
                <span id="fileName"></span>
                <button type="button" class="remove-btn" id="removeFile">✕ Quitar</button>
              </div>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Enviar Pedido</button>
          <button type="reset" class="btn btn-secondary" id="resetBtn">Limpiar</button>
        </div>

      </form>
    </div>

    <!-- Historial del usuario -->
    <div class="card" style="margin-top:24px">
      <div class="section-header">
        <h2 class="card-title" style="margin-bottom:0">Mis Pedidos</h2>
        <span class="count-badge" id="myCount">0</span>
      </div>
      <p class="card-subtitle">Historial de tus solicitudes de plegado</p>

      <div class="filter-bar" style="margin-bottom:16px">
        <select id="myFilterEstado" class="filter-select" style="width:auto">
          <option value="">Todos los estados</option>
          <option value="Pendiente">Pendiente</option>
          <option value="Completado">Completado</option>
        </select>
      </div>

      <div id="misPedidosList" class="pedidos-list"></div>
    </div>
  </main>

  <!-- Modal detalle -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Detalle del Pedido</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
